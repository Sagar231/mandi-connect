# Nixpacks build config for Railway.
[phases.setup]
nixPkgs = ["python312", "gcc", "postgresql"]

[phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = [". /opt/venv/bin/activate && DJANGO_SECRET_KEY=build DATABASE_URL=sqlite:///build.sqlite3 REDIS_URL=redis://localhost:6379/0 python manage.py collectstatic --noinput"]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
