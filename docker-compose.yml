services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mandiconnect
      POSTGRES_USER: mandi
      POSTGRES_PASSWORD: mandi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mandi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    env_file: .env
    environment:
      DATABASE_URL: postgres://mandi:mandi@db:5432/mandiconnect
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://mandi:mandi@db:5432/mandiconnect
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://mandi:mandi@db:5432/mandiconnect
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
