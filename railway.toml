# Railway service config. The web service uses Nixpacks (nixpacks.toml).
# Add separate "worker" and "beat" services in the Railway dashboard pointing
# at this same repo, with custom start commands:
#   worker: celery -A config worker -l info
#   beat:   celery -A config beat -l info
# Attach the PostgreSQL and Redis plugins to all three services.

[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/schema/"
timeout = 100
