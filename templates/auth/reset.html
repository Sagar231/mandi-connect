{% extends "base.html" %}
{% block title %}Reset password — MandiConnect{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
  <div class="bg-white rounded-2xl shadow-card p-8">
    <h1 class="text-2xl font-bold mb-4">Reset password</h1>
    <form id="req-form" class="space-y-3">
      <input id="email" type="email" placeholder="Your email" required class="w-full border rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-mandi-500" />
      <button class="w-full bg-mandi-600 text-white rounded-xl py-2.5 font-medium hover:bg-mandi-700">Send reset link</button>
    </form>
    <div id="confirm-box" class="hidden mt-6 border-t pt-4">
      <h2 class="font-semibold mb-2">Set a new password</h2>
      <form id="confirm-form" class="space-y-3">
        <input id="password" type="password" placeholder="New password" required class="w-full border rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-mandi-500" />
        <button class="w-full bg-mandi-600 text-white rounded-xl py-2.5 font-medium hover:bg-mandi-700">Update password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
$(function(){
  const p=new URLSearchParams(location.search), uid=p.get("uid"), token=p.get("token");
  if(uid&&token) $("#confirm-box").removeClass("hidden");
  $("#req-form").on("submit",function(e){ e.preventDefault();
    MC.post("/auth/password/reset/",{email:$("#email").val()}).then(r=>toast(r.detail||"Reset link sent.")).catch(xhr=>toast(MC.errText(xhr),false)); });
  $("#confirm-form").on("submit",function(e){ e.preventDefault();
    MC.post("/auth/password/reset/confirm/",{uid:uid,token:token,password:$("#password").val()})
      .then(()=>{ toast("Password updated. Please log in."); setTimeout(()=>location.href="/login/",1000); }).catch(xhr=>toast(MC.errText(xhr),false)); });
});
</script>
{% endblock %}
