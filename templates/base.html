{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MandiConnect{% endblock %}</title>
  <meta name="description" content="MandiConnect: browse local mandis and compare live vendor prices for fresh produce." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { mandi: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' } },
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
        boxShadow: { card: '0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04)', lift: '0 10px 30px -10px rgba(22,163,74,.25)' },
      } }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="{% static 'js/api.js' %}"></script>
  <style>
    body{font-family:'Inter',system-ui,sans-serif}
    .img-fallback{background:linear-gradient(135deg,#dcfce7,#bbf7d0)}
    .skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 37%,#f1f5f9 63%);background-size:400% 100%;animation:sk 1.4s ease infinite}
    @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col antialiased">
  {% include "partials/navbar.html" %}
  <main class="flex-1 w-full">{% block content %}{% endblock %}</main>
  {% include "partials/footer.html" %}
  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-3 rounded-xl shadow-lg text-white text-sm max-w-sm whitespace-pre-line z-50"></div>
  <script>
    function toast(msg, ok){
      const t=$("#toast");
      t.text(msg).removeClass("hidden bg-red-600 bg-mandi-600")
       .addClass(ok===false?"bg-red-600":"bg-mandi-600").stop(true,true).fadeIn();
      setTimeout(()=>t.fadeOut(),3500);
    }
    // Global <img> fallback helper.
    function imgFallback(el){ el.onerror=null; el.src="https://placehold.co/600x400/dcfce7/15803d?text=MandiConnect"; }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
